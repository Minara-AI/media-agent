name: wechat
display_name: "微信公众号"
auth_type: api_key
auth_env_var: WECHAT_APP_ID
content_format: html
max_title_length: 64
max_body_length: null
supports_images: true
image_upload: api
image_sizes:
  header: { width: 900, height: 383 }
  thumb: { width: 200, height: 200 }
auth_env_vars:
  - WECHAT_APP_ID
  - WECHAT_APP_SECRET
notes: |
  WeChat requires: appid + appsecret, IP whitelist on WeChat developer platform.
  Content must be HTML with inline styles. All images must be uploaded to WeChat material library.
  Publishing flow: get access_token → upload cover image → upload content images → create draft → submit publish.
  Content may be rejected during platform review (审核).
