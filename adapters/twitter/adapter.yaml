name: twitter
display_name: "Twitter/X"
auth_type: browser
auth_env_var: null
content_format: thread
max_title_length: null
max_body_length: 280
supports_images: false
image_upload: null
image_sizes:
  card: { width: 1200, height: 675 }
notes: |
  Uses bb-browser (Chrome automation) instead of Twitter API.
  Requires: Chrome running with --remote-debugging-port=9222, logged into Twitter.
  Zero cost, no API key needed.
