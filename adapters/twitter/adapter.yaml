name: twitter
display_name: "Twitter/X"
auth_type: api_key
auth_env_var: TWITTER_API_KEY
extra_env_vars:
  - TWITTER_API_SECRET
  - TWITTER_ACCESS_TOKEN
  - TWITTER_ACCESS_TOKEN_SECRET
content_format: thread
max_title_length: null
max_body_length: 280  # per tweet
supports_images: false  # v1.1: text-only threads, image upload in v1.2
image_upload: api
image_sizes:
  card: { width: 1200, height: 675 }
